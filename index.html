<!DOCTYPE html>
<html lang="en">
<head>
    <title>Interactive Navigation Menu</title>
    <style>
        *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

html{
    scroll-behavior:smooth;
}

body{
    background:#f5f5f5;
}

#navbar{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 50px;
    background:#222;
    transition:0.4s;
    z-index:1000;
}

.logo{
    color:white;
    font-size:26px;
    font-weight:bold;
}

.nav-links{
    display:flex;
    list-style:none;
}

.nav-links li{
    margin-left:25px;
}

.nav-links a{
    color:white;
    text-decoration:none;
    font-size:18px;
    padding:8px 12px;
    transition:0.3s;
    border-radius:5px;
}

.nav-links a:hover{
    background:#00bcd4;
    color:white;
}

.scrolled{
    background:#0d6efd;
    box-shadow:0 4px 10px rgba(0,0,0,0.3);
    padding:15px 50px;
}

section{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    font-size:30px;
}

#home{
    background:#e3f2fd;
}

#about{
    background:#fff3cd;
}

#services{
    background:#d1e7dd;
}

#portfolio{
    background:#f8d7da;
}

#contact{
    background:#dbeafe;
}
    </style>
</head>
<body>

    <nav id="navbar">
        <div class="logo">Website</div>

        <ul class="nav-links">
            <li><a href="#home">Home</a></li>
            <li><a href="#about">About</a></li>
            <li><a href="#services">Services</a></li>
            <li><a href="#portfolio">Portfolio</a></li>
            <li><a href="#contact">Contact</a></li>
        </ul>
    </nav>

    <section id="home">
        <h1>Home</h1>
        <p>Welcome to our website.</p>
    </section>

    <section id="about">
        <h1>About</h1>
        <p>This section contains information about us.</p>
    </section>

    <section id="services">
        <h1>Services</h1>
        <p>We provide web development services.</p>
    </section>

    <section id="portfolio">
        <h1>Portfolio</h1>
        <p>Some of our recent projects.</p>
    </section>

    <section id="contact">
        <h1>Contact</h1>
        <p>Email: example@gmail.com</p>
    </section>

    <script src="script.js"></script>

</body>
<script>
    window.addEventListener('scroll', function() {
        const navbar = document.getElementById('navbar');
        if (window.scrollY > 50) {
            navbar.classList.add('scrolled');
        } else {
            navbar.classList.remove('scrolled');
        }
    });
</script>
</html>
